; Network configuration for micro-ROS WiFi transport
; Copy this file to network_config.ini and fill in your values
;   cp network_config.example.ini network_config.ini

[network]
wifi_ssid = YourSSID
wifi_password = YourPassword
agent_ip = { 192, 168, 1, 100 }
agent_port = 8888
; Static IP for the ESP32 (comment out for DHCP)
static_ip = { 192, 168, 1, 200 }
gateway = { 192, 168, 1, 1 }
subnet = { 255, 255, 255, 0 }
