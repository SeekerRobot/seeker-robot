; Network configuration for micro-ROS WiFi transport
; Copy this file to network_config.ini and fill in your values
;   cp network_config.example.ini network_config.ini

[network]
wifi_ssid = YourSSID
wifi_password = YourPassword
agent_ip = { 192, 168, 8, 134 }
agent_port = 8888
; Static IP for the ESP32. Must be assigned for microROS to work correctly
static_ip = { 192, 168, 8, 50 }
gateway = { 192, 168, 8, 1 }
subnet = { 255, 255, 255, 0 }
; OTA flashing — device IP as a plain string (used by _ota environments)
ota_upload_port = 192.168.8.50
; Satellite board — camera + mic + gyro offload running its own micro-ROS
; node (/seeker_satellite_node, heartbeat on /mcu/heartbeat2). See
; mcu_ws/src/main_satellite. Default hardware is ESP32-CAM
; (env esp32cam_satellite); esp32s3sense_satellite is the alternate target.
; Must be a different IP than static_ip since both boards share the LAN.
; Both OTA variants (esp32cam_satellite_ota, esp32s3sense_satellite_ota)
; flash to the IP below.
satellite_ip = { 192, 168, 8, 51 }
satellite_ota_upload_port = 192.168.8.51
