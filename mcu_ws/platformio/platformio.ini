; 0. Shared settings
; default_envs intentionally not set here — each sketch's local platformio.ini
; declares its own. Setting it here would override the sketch's local value
; because extra_configs entries win the merge order in PlatformIO.
[platformio]
extra_configs = ../../platformio/network_config.ini

; 1. Definitions, shared variables
[common]
; Force C++ 17
build_flags =
    -std=gnu++17
    -DTHREADING_SCHEME_ESP_MODERN
build_unflags = -std=gnu++11
; Define common shared libs here
lib_base =
;    https://github.com/adafruit/Adafruit_BNO08x.git#0301e6d
;    https://github.com/IEEE-UCF/SEC-Base-Classes.git#a5f8c9f
;    https://github.com/lexus2k/ssd1306.git
;    https://github.com/pfeerick/elapsedMillis.git#8be9e66
;    https://github.com/h2zero/NimBLE-Arduino#8370464
;    fastled/FastLED @ ^3.9.0
;    https://github.com/kaiaai/LDS.git#a5335da

; 2. Global settings
[env]
monitor_speed = 921600
lib_deps = ${common.lib_base}

; 3. Base board configurations
[esp32_microros_wifi]
framework = arduino
board_microros_distro = jazzy
board_microros_transport = wifi
board_microros_user_meta = ../../platformio/custom_microros.meta
board_microros_extra_packages = ../../platformio/extra_packages
lib_extra_dirs =
    ../../libs_external/esp32
    ../../lib/
lib_deps = ${common.lib_base}
build_unflags = ${common.build_unflags}
build_flags =
    ${common.build_flags}
    -DMICRO_ROS_TRANSPORT_ARDUINO_WIFI
    '-DAGENT_IP=${network.agent_ip}'
    '-DAGENT_PORT=${network.agent_port}'
    '-DWIFI_SSID="${network.wifi_ssid}"'
    '-DWIFI_PASSWORD="${network.wifi_password}"'
    '-DSTATIC_IP=${network.static_ip}'
    '-DGATEWAY=${network.gateway}'
    '-DSUBNET=${network.subnet}'

[esp32_microros_serial]
framework = arduino
board_microros_distro = jazzy
board_microros_transport = serial
board_microros_user_meta = ../../platformio/custom_microros.meta
board_microros_extra_packages = ../../extra_packages
lib_extra_dirs =
   ../../libs_external/esp32
   ../../lib/
lib_deps = ${common.lib_base}
build_unflags = ${common.build_unflags}
build_flags =
    ${common.build_flags}
    -DMICRO_ROS_TRANSPORT_ARDUINO_SERIAL

; 4. Board environments
[env:esp32dev]
extends = esp32_microros_wifi
platform = espressif32
board = esp32dev
board_build.partitions = min_spiffs.csv
build_flags =
    ${esp32_microros_wifi.build_flags}
    -DLED_BUILTIN=2
    -DENV_ESP32DEV
    -DDEBUG_TRANSPORT_SERIAL
    -DDEBUG_TRANSPORT_BLUETOOTH
    -DDEBUG_TRANSPORT_MICROROS
    -DDEBUG_LEVEL=4
    -DBRIDGE_ENABLE_HEARTBEAT=1
    -DBRIDGE_ENABLE_GYRO=1
    -DBRIDGE_ENABLE_BATTERY=1
    -DBRIDGE_ENABLE_LIDAR=1
    -DBRIDGE_ENABLE_DEBUG=1
    -DENABLE_ARDUINO_OTA=1

[env:esp32s3sense]
extends = esp32_microros_wifi
platform = espressif32 #platform = espressif32 @ ^6.7.0
board = seeed_xiao_esp32s3
board_build.partitions = min_spiffs.csv
upload_protocol = esptool
lib_deps =
    ${esp32_microros_wifi.lib_deps}
    espressif/esp32-camera
build_flags =
    ${esp32_microros_wifi.build_flags}
    -DENV_ESP32S3SENSE
    -DI2S_MODE_DAC_BUILT_IN=0x10
    -DDEBUG_TRANSPORT_SERIAL
    -DDEBUG_TRANSPORT_BLUETOOTH
    -DDEBUG_TRANSPORT_MICROROS
    -DDEBUG_LEVEL=4
    -DBRIDGE_ENABLE_HEARTBEAT=1
    -DBRIDGE_ENABLE_GYRO=1
    -DBRIDGE_ENABLE_BATTERY=1
    -DBRIDGE_ENABLE_LIDAR=1
    -DBRIDGE_ENABLE_DEBUG=1
    -DENABLE_ARDUINO_OTA=1

[env:esp32devserial]
extends = esp32_microros_serial
platform = espressif32
board = esp32dev
build_flags =
    ${esp32_microros_serial.build_flags}
    -DLED_BUILTIN=2
    -DENV_ESP32DEV
    -DDEBUG_TRANSPORT_BLUETOOTH
    -DDEBUG_TRANSPORT_MICROROS
    -DDEBUG_LEVEL=4
    -DBRIDGE_ENABLE_HEARTBEAT=1
    -DBRIDGE_ENABLE_GYRO=1
    -DBRIDGE_ENABLE_BATTERY=1
    -DBRIDGE_ENABLE_DEBUG=1

[env:esp32s3senseserial]
extends = esp32_microros_serial
platform = espressif32
board = seeed_xiao_esp32s3
build_flags =
    ${esp32_microros_serial.build_flags}
    -DENV_ESP32S3SENSE
    -DI2S_MODE_DAC_BUILT_IN=0x10
    -DDEBUG_TRANSPORT_BLUETOOTH
    -DDEBUG_TRANSPORT_MICROROS
    -DDEBUG_LEVEL=4
    -DBRIDGE_ENABLE_HEARTBEAT=1
    -DBRIDGE_ENABLE_GYRO=1
    -DBRIDGE_ENABLE_BATTERY=1
    -DBRIDGE_ENABLE_DEBUG=1

[env:esp32cam]
extends = esp32_microros_wifi
platform = espressif32
board = esp32cam
lib_deps =
    ${esp32_microros_wifi.lib_deps}
    espressif/esp32-camera
build_flags =
    ${esp32_microros_wifi.build_flags}
    -DENV_ESP32CAM
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DDEBUG_TRANSPORT_SERIAL
    -DDEBUG_TRANSPORT_BLUETOOTH
    -DDEBUG_LEVEL=4
board_build.partitions = huge_app.csv

; 5. OTA upload variants — flash over WiFi instead of serial.
;    Usage: pio run -e esp32dev_ota -t upload
;    The device must be running firmware with ENABLE_ARDUINO_OTA=1 and connected
;    to WiFi. Set ota_upload_port in network_config.ini to the device's static IP.
[ota_upload]
upload_protocol = espota
upload_port = ${network.ota_upload_port}

[env:esp32dev_ota]
extends = env:esp32dev, ota_upload

[env:esp32s3sense_ota]
extends = env:esp32s3sense, ota_upload
