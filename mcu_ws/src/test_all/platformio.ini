[platformio]
extra_configs = ../../platformio/platformio.ini
default_envs = esp32s3sense_psram

; pioarduino-backed env: arduino-esp32 3.1.3 + IDF 5.3.2. Needed for
; CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP=y which routes non-DMA WiFi/lwIP
; allocations to PSRAM, freeing internal/DMA RAM under concurrent load.
[env:esp32s3sense_psram]
extends = env:esp32s3sense
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
framework = arduino
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults
board_build.arduino.memory_type = qio_opi
build_flags =
    ${env:esp32s3sense.build_flags}
    -DBOARD_HAS_PSRAM
    -DENABLE_BLE_DEBUG=0
