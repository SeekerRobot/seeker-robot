[platformio]
extra_configs = ../../platformio/platformio.ini
default_envs  = esp32s3sense

; WiFi + MJPEG stream camera test — no micro-ROS.
; lib_extra_dirs excludes libs_external/esp32 to avoid pulling in micro-ROS.

[env:esp32s3sense]
platform      = espressif32
board         = seeed_xiao_esp32s3
framework     = arduino
lib_extra_dirs = ../../lib/
lib_deps       =
    ${common.lib_base}
    espressif/esp32-camera
build_unflags  = ${common.build_unflags}
build_flags    =
    ${common.build_flags}
    -DENV_ESP32S3SENSE
    -DDEBUG_TRANSPORT_SERIAL
    -DDEBUG_LEVEL=4
    '-DWIFI_SSID="${network.wifi_ssid}"'
    '-DWIFI_PASSWORD="${network.wifi_password}"'
    '-DSTATIC_IP=${network.static_ip}'
    '-DGATEWAY=${network.gateway}'
    '-DSUBNET=${network.subnet}'

[env:esp32cam]
platform      = espressif32
board         = esp32cam
framework     = arduino
lib_extra_dirs = ../../lib/
lib_deps       =
    ${common.lib_base}
    espressif/esp32-camera
build_unflags  = ${common.build_unflags}
build_flags    =
    ${common.build_flags}
    -DENV_ESP32CAM
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DDEBUG_TRANSPORT_SERIAL
    -DDEBUG_LEVEL=4
    '-DWIFI_SSID="${network.wifi_ssid}"'
    '-DWIFI_PASSWORD="${network.wifi_password}"'
    '-DSTATIC_IP=${network.static_ip}'
    '-DGATEWAY=${network.gateway}'
    '-DSUBNET=${network.subnet}'
board_build.partitions = huge_app.csv
