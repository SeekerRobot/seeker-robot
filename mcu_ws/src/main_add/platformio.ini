[platformio]
extra_configs = ../../platformio/platformio.ini
default_envs  = esp32s3sense

; Phase-6 bring-up of main_add — full micro-ROS stack enabled:
; MicroRosBridge (heartbeat, gyro, battery, lidar, debug log), MicrorosManager
; transporting over WiFi, GaitRosParticipant subscribed to /cmd_vel. Camera
; lib_dep restored for the S3 env. DEBUG_LEVEL bumped back to 4 for richer
; agent-side log output.

[env:esp32s3sense]
extends = esp32_microros_wifi
platform = espressif32
board    = seeed_xiao_esp32s3
board_build.partitions = min_spiffs.csv
upload_protocol        = esptool
lib_deps =
    ${esp32_microros_wifi.lib_deps}
    espressif/esp32-camera
build_flags =
    ${esp32_microros_wifi.build_flags}
    -DENV_ESP32S3SENSE
    -DI2S_MODE_DAC_BUILT_IN=0x10
    -DDEBUG_TRANSPORT_SERIAL
    -DDEBUG_TRANSPORT_MICROROS
    -UDEBUG_LEVEL
    -DDEBUG_LEVEL=4
    -DBRIDGE_ENABLE_HEARTBEAT=1
    -DBRIDGE_ENABLE_GYRO=1
    -DBRIDGE_ENABLE_BATTERY=1
    -DBRIDGE_ENABLE_LIDAR=1
    -DBRIDGE_ENABLE_DEBUG=1
    -DENABLE_ARDUINO_OTA=1

[env:esp32dev]
extends = esp32_microros_wifi
platform = espressif32
board    = esp32dev
board_build.partitions = min_spiffs.csv
build_flags =
    ${esp32_microros_wifi.build_flags}
    -DLED_BUILTIN=2
    -DENV_ESP32DEV
    -DDEBUG_TRANSPORT_SERIAL
    -DDEBUG_TRANSPORT_MICROROS
    -UDEBUG_LEVEL
    -DDEBUG_LEVEL=4
    -DBRIDGE_ENABLE_HEARTBEAT=1
    -DBRIDGE_ENABLE_GYRO=1
    -DBRIDGE_ENABLE_BATTERY=1
    -DBRIDGE_ENABLE_LIDAR=1
    -DBRIDGE_ENABLE_DEBUG=1
    -DENABLE_ARDUINO_OTA=1

; OTA variants — flash over WiFi once the firmware is running.
;   pio run -e esp32s3sense_ota -t upload
[env:esp32s3sense_ota]
extends = env:esp32s3sense, ota_upload

[env:esp32dev_ota]
extends = env:esp32dev, ota_upload
