[platformio]
extra_configs = ../../platformio/platformio.ini
default_envs  = esp32s3sense

; Serial-only LiDAR hardware test — no micro-ROS, no WiFi transport.
; lib_extra_dirs excludes libs_external/esp32 to avoid pulling in micro-ROS.

[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
lib_extra_dirs = ../../lib/
lib_deps       = ${common.lib_base}
build_unflags  = ${common.build_unflags}
build_flags    =
    ${common.build_flags}
    -DLED_BUILTIN=2
    -DENV_ESP32DEV
    -DDEBUG_TRANSPORT_SERIAL
    -DDEBUG_LEVEL=4

[env:esp32s3sense]
platform      = espressif32
board         = seeed_xiao_esp32s3
framework     = arduino
lib_extra_dirs = ../../lib/
lib_deps       = ${common.lib_base}
build_unflags  = ${common.build_unflags}
build_flags    =
    ${common.build_flags}
    -DENV_ESP32S3SENSE
    -DDEBUG_TRANSPORT_SERIAL
    -DDEBUG_LEVEL=4
