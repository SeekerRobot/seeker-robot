[platformio]
extra_configs = ../../platformio/platformio.ini
default_envs  = esp32s3sense_satellite

; Dedicated sketch for the camera+mic satellite board. No micro-ROS stack —
; the satellite only exposes HTTP endpoints (MJPEG on :80, PCM on :81) that
; the ROS 2 host reaches directly. Keeps the satellite lean and avoids
; pulling in the heavy micro-ROS link dependencies.
;
; Flash: pio run -e esp32s3sense_satellite -t upload
; OTA:   pio run -e esp32s3sense_satellite_ota -t upload
;        (requires satellite_ota_upload_port in network_config.ini)
[satellite_base]
framework = arduino
lib_extra_dirs = ../../lib/
lib_deps =
    ${common.lib_base}
    espressif/esp32-camera
build_unflags = ${common.build_unflags}
build_flags =
    ${common.build_flags}
    '-DWIFI_SSID="${network.wifi_ssid}"'
    '-DWIFI_PASSWORD="${network.wifi_password}"'
    '-DSATELLITE_IP=${network.satellite_ip}'
    '-DGATEWAY=${network.gateway}'
    '-DSUBNET=${network.subnet}'

; pioarduino platform — same reasoning as the primary board: the sketch
; runs two concurrent HTTP servers (MJPEG + PCM), and routing non-DMA
; WiFi/lwIP allocations to PSRAM via CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP
; keeps internal SRAM free for PBUFs. memory_type=qio_opi required for the
; octal PSRAM on XIAO S3 Sense.
[env:esp32s3sense_satellite]
extends = satellite_base
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
board    = seeed_xiao_esp32s3
board_build.partitions = min_spiffs.csv
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults
board_build.arduino.memory_type = qio_opi
upload_protocol        = esptool
build_flags =
    ${satellite_base.build_flags}
    -DENV_ESP32S3SENSE
    -DBOARD_HAS_PSRAM
    -DDEBUG_TRANSPORT_SERIAL
    -DDEBUG_LEVEL=4
    -DENABLE_ARDUINO_OTA=1

[satellite_ota_upload]
upload_protocol = espota
upload_port = ${network.satellite_ota_upload_port}

[env:esp32s3sense_satellite_ota]
extends = env:esp32s3sense_satellite, satellite_ota_upload
