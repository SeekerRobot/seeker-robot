[platformio]
extra_configs = ../../platformio/platformio.ini
default_envs  = esp32cam_satellite

; Satellite board sketch — camera + mic + gyro offload from the main ESP32-S3.
; Two supported hardware targets:
;   - esp32cam_satellite  (default) — AI-Thinker ESP32-CAM.  CAM + gyro, no mic.
;   - esp32s3sense_satellite         — Seeed XIAO ESP32-S3 Sense. CAM + mic + gyro.
;
; Both envs enable micro-ROS over WiFi so the gyro publishes /mcu/imu and
; heartbeats land on /mcu/heartbeat2 (main publishes heartbeat1). Camera and
; mic continue to expose HTTP endpoints the ROS 2 host pulls directly:
;   GET http://<SATELLITE_IP>:80/cam    — MJPEG
;   GET http://<SATELLITE_IP>:81/audio  — 16 kHz PCM mono (S3-Sense only)
;
; Flash:
;   pio run                               # default = esp32cam_satellite
;   pio run -e esp32s3sense_satellite -t upload
; OTA (once firmware with ENABLE_ARDUINO_OTA=1 is on the board):
;   pio run -e esp32cam_satellite_ota -t upload
;   pio run -e esp32s3sense_satellite_ota -t upload
; Requires satellite_ota_upload_port in network_config.ini.

; Flag block shared by both satellite envs — the per-env sections only
; override what actually differs (platform, board, PSRAM flavor, and
; ENABLE_MIC, which is S3-only).
; Flags that differ between the two satellite envs (intentionally NOT here):
;   ENABLE_GYRO / BRIDGE_ENABLE_GYRO  — CAM off (stock-arduino I2C panic),
;                                       S3 on
;   ENABLE_MICROROS / BRIDGE_ENABLE_HEARTBEAT — CAM off for now (executor
;                                       contends with MJPEG on 4 MB ESP32),
;                                       S3 on
[satellite_common]
build_flags =
    '-DSATELLITE_IP=${network.satellite_ip}'
    -DBRIDGE_ENABLE_BATTERY=0
    -DBRIDGE_ENABLE_LIDAR=0
    -DBRIDGE_ENABLE_DEBUG=0
    -DENABLE_CAM=1
    -DENABLE_ARDUINO_OTA=1
    -DDEBUG_TRANSPORT_SERIAL
    -DDEBUG_TRANSPORT_MICROROS
    -DDEBUG_LEVEL=4
    -DSAFE_MODE_UDP_PORT=4211

; AI-Thinker ESP32-CAM — default satellite target. No onboard mic, so
; ENABLE_MIC stays 0. Stock espressif32 platform (not pioarduino) — the
; ESP32-CAM PSRAM cache errata needs -mfix-esp32-psram-cache-issue, which is
; only wired through the native Espressif platform. huge_app partitions
; because the camera + micro-ROS + WiFi image overruns the default 1.2 MB
; app slot.
[env:esp32cam_satellite]
extends = esp32_microros_wifi
platform = espressif32
board    = esp32cam
board_build.partitions = huge_app.csv
lib_deps =
    ${esp32_microros_wifi.lib_deps}
    espressif/esp32-camera
build_flags =
    ${esp32_microros_wifi.build_flags}
    ${satellite_common.build_flags}
    -DENV_ESP32CAM
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DLED_BUILTIN=33
    -DENABLE_MIC=0
    -DENABLE_GYRO=0
    -DBRIDGE_ENABLE_GYRO=0
    ; micro-ROS temporarily off on the CAM variant — XRCE-DDS executor on
    ; Core 1 contends with the MJPEG send path on a 4 MB non-S3 ESP32 and
    ; throttles the stream to ~3 fps. Re-enable after profiling or move
    ; the IMU to a separate satellite.
    -DENABLE_MICROROS=0
    -DBRIDGE_ENABLE_HEARTBEAT=0

; Seeed XIAO ESP32-S3 Sense — alternate satellite target. Only the camera is
; offloaded to this board; mic stays on the main sketch and gyro is disabled
; robot-wide for now. Uses the pinned pioarduino platform + octal-PSRAM
; sdkconfig.defaults like the rest of the S3 envs so WiFi/lwIP allocations
; route into PSRAM and internal SRAM stays free for PBUFs under the
; concurrent MJPEG + micro-ROS load.
[env:esp32s3sense_satellite]
extends = esp32_microros_wifi
platform = ${common.s3_platform}
board    = seeed_xiao_esp32s3
board_build.partitions = min_spiffs.csv
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults
board_build.arduino.memory_type = qio_opi
upload_protocol = esptool
lib_deps =
    ${esp32_microros_wifi.lib_deps}
    espressif/esp32-camera
build_flags =
    ${esp32_microros_wifi.build_flags}
    ${satellite_common.build_flags}
    -DENV_ESP32S3SENSE
    -DBOARD_HAS_PSRAM
    -DI2S_MODE_DAC_BUILT_IN=0x10
    -DENABLE_MIC=0
    -DENABLE_GYRO=0
    -DBRIDGE_ENABLE_GYRO=0
    -DENABLE_MICROROS=1
    -DBRIDGE_ENABLE_HEARTBEAT=1

; OTA variants — flash over WiFi.
[satellite_ota_upload]
upload_protocol = espota
upload_port = ${network.satellite_ota_upload_port}

[env:esp32cam_satellite_ota]
extends = env:esp32cam_satellite, satellite_ota_upload

[env:esp32s3sense_satellite_ota]
extends = env:esp32s3sense_satellite, satellite_ota_upload
