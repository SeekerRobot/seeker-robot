[platformio]
extra_configs = ../../platformio/platformio.ini
default_envs  = esp32s3sense_offload

; Override the workspace DEBUG_LEVEL=4 to =2 so battery and gait samples
; don't flood the console. Last -D wins; pair with -U for clarity.

; pioarduino-backed env: arduino-esp32 3.1.3 + IDF 5.3.2. Needed for
; CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP=y (see sdkconfig.defaults) which
; routes non-DMA WiFi/lwIP allocations to PSRAM, freeing internal/DMA RAM
; under concurrent load and dramatically lowering PBUF-pool pressure.
; memory_type=qio_opi is required for the octal PSRAM on XIAO S3 Sense.
;
; Named _main (rather than plain esp32s3sense) so it doesn't collide with
; the shared platformio/platformio.ini's [env:esp32s3sense], which would
; otherwise override this block's pioarduino platform URL.
[env:esp32s3sense_main]
extends = esp32_microros_wifi
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
board    = seeed_xiao_esp32s3
board_build.partitions = min_spiffs.csv
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults
board_build.arduino.memory_type = qio_opi
upload_protocol        = esptool
lib_deps =
    ${esp32_microros_wifi.lib_deps}
    espressif/esp32-camera
build_flags =
    ${esp32_microros_wifi.build_flags}
    -DENV_ESP32S3SENSE
    -DBOARD_HAS_PSRAM
    -DI2S_MODE_DAC_BUILT_IN=0x10
    -DDEBUG_TRANSPORT_SERIAL
    -DDEBUG_TRANSPORT_MICROROS
    -UDEBUG_LEVEL
    -DDEBUG_LEVEL=2
    -DBRIDGE_ENABLE_HEARTBEAT=1
    -DBRIDGE_ENABLE_GYRO=1
    -DBRIDGE_ENABLE_BATTERY=1
    -DBRIDGE_ENABLE_LIDAR=1
    -DBRIDGE_ENABLE_DEBUG=1
    -DENABLE_ARDUINO_OTA=1
    -DENABLE_CAM=1
    -DENABLE_MIC=1
    -DENABLE_SPK=1
    -DSAFE_MODE_THRESHOLD=5
    -DSAFE_MODE_STABLE_MS=10000

[env:esp32dev]
extends = esp32_microros_wifi
platform = espressif32
board    = esp32dev
board_build.partitions = min_spiffs.csv
build_flags =
    ${esp32_microros_wifi.build_flags}
    -DLED_BUILTIN=2
    -DENV_ESP32DEV
    -DDEBUG_TRANSPORT_SERIAL
    -DDEBUG_TRANSPORT_MICROROS
    -UDEBUG_LEVEL
    -DDEBUG_LEVEL=2
    -DBRIDGE_ENABLE_HEARTBEAT=1
    -DBRIDGE_ENABLE_GYRO=1
    -DBRIDGE_ENABLE_BATTERY=1
    -DBRIDGE_ENABLE_LIDAR=1
    -DBRIDGE_ENABLE_DEBUG=1
    -DENABLE_ARDUINO_OTA=1
    -DSAFE_MODE_THRESHOLD=5
    -DSAFE_MODE_STABLE_MS=10000

; Offload variant — camera + mic handed off to a separate XIAO S3 Sense board
; running the `main_satellite` sketch. Speaker stays on the main board so TTS
; continues to work. Drops ~1-2 KB of internal SRAM pressure from the MJPEG
; server and I2S DMA buffers that otherwise starve the lwIP PBUF pool under
; concurrent micro-ROS + camera + mic + speaker + OLED traffic.
[env:esp32s3sense_offload]
extends = env:esp32s3sense_main
build_flags =
    ${esp32_microros_wifi.build_flags}
    -DENV_ESP32S3SENSE
    -DBOARD_HAS_PSRAM
    -DI2S_MODE_DAC_BUILT_IN=0x10
    -DDEBUG_TRANSPORT_SERIAL
    -DDEBUG_TRANSPORT_MICROROS
    -UDEBUG_LEVEL
    -DDEBUG_LEVEL=2
    -DBRIDGE_ENABLE_HEARTBEAT=1
    -DBRIDGE_ENABLE_GYRO=1
    -DBRIDGE_ENABLE_BATTERY=1
    -DBRIDGE_ENABLE_LIDAR=1
    -DBRIDGE_ENABLE_DEBUG=1
    -DENABLE_ARDUINO_OTA=1
    -DENABLE_CAM=0
    -DENABLE_MIC=0
    -DENABLE_SPK=1
    -DSAFE_MODE_THRESHOLD=5
    -DSAFE_MODE_STABLE_MS=10000
lib_deps =
    ${esp32_microros_wifi.lib_deps}

; OTA variants — flash over WiFi once firmware with ENABLE_ARDUINO_OTA=1 is on.
;   pio run -e esp32s3sense_main_ota -t upload
[env:esp32s3sense_main_ota]
extends = env:esp32s3sense_main, ota_upload

[env:esp32s3sense_offload_ota]
extends = env:esp32s3sense_offload, ota_upload

[env:esp32dev_ota]
extends = env:esp32dev, ota_upload
