# Nav2 parameters for the Seeker hexapod on REAL HARDWARE.
# Identical to nav2_params.yaml except:
#   - use_sim_time: false throughout
#   - scan topics: /mcu/scan (from micro-ROS ESP32 bridge, not Gazebo)
#
# Launch with: ros2 launch seeker_navigation real_ball_search.launch.py

# ------------------------------------------------------------------
# bt_navigator
# ------------------------------------------------------------------
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 10

# ------------------------------------------------------------------
# controller_server (DWB local planner)
# ------------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 5.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 8.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      # Generous goal tolerances — getting "close enough" unblocks waypoint
      # chaining. Tight tolerances caused the robot to spin forever at a
      # goal trying to nail the last few cm / degrees it can't hit from
      # gait slippage and odom drift.
      xy_goal_tolerance: 0.40
      yaw_goal_tolerance: 1.57   # 90° — don't care about heading, just position
      stateful: true

    FollowPath:
      # Regulated Pure Pursuit instead of DWB. DWB's trajectory-sampling
      # approach produced angular oscillation (hunting between +max and -max
      # wz on a small indoor map). RPP is geometric: picks a point on the
      # path at `lookahead_dist` and computes smooth curvature toward it.
      # No critic weights, no sampling, no ties to flip between.
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.10
      min_linear_velocity: 0.0
      # Larger lookahead → gentler angular (ω = 2·v·sin(α)/L_d).
      # At L_d=0.8, max geometric angular at 90° offset = 0.25 rad/s (vs 0.50
      # at L_d=0.4). Trade-off: wider turns, cuts corners more on sharp paths.
      lookahead_dist: 0.8
      min_lookahead_dist: 0.4
      max_lookahead_dist: 1.2
      use_velocity_scaled_lookahead_dist: true
      lookahead_time: 1.5

      # rotate_to_heading disabled: on noisy odom, the near-threshold check
      # flips between "arc forward" and "stop and turn" every tick, producing
      # the ±wz oscillation we were seeing. With it off, RPP always arcs —
      # smoother cmd_vel, possibly slightly wider turns.
      allow_reversing: false
      use_rotate_to_heading: false
      max_angular_accel: 1.0
      rotate_to_heading_angular_vel: 0.20

      # Curvature regulation OFF — was dragging linear to 0.05 floor on every
      # indoor turn. Cost regulation ON — safer, only slows near obstacles.
      use_regulated_linear_velocity_scaling: false
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.3
      regulated_linear_scaling_min_speed: 0.05
      # Start slowing further from inflated cost (match inflation_radius) and
      # weight inflation more aggressively so RPP steers away from walls
      # rather than just slowing next to them.
      cost_scaling_dist: 0.4
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 5.0

      # Goal behaviour
      transform_tolerance: 0.5
      use_collision_detection: true
      # 2 s @ 0.10 m/s = 20 cm collision-check horizon (was 10 cm).
      max_allowed_time_to_collision_up_to_carrot: 2.0

# ------------------------------------------------------------------
# planner_server (NavfnPlanner)
# ------------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      # Very generous planner tolerance — accept any free cell within 1m of
      # the requested goal. Frontier goals sit on known/unknown boundaries
      # that are often surrounded by inflated obstacles; a large tolerance
      # lets the planner "snap" to a reachable cell rather than aborting.
      tolerance: 1.0
      use_astar: true
      allow_unknown: true

# ------------------------------------------------------------------
# behavior_server (recovery behaviors)
# ------------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.2
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.20
    min_rotational_vel: 0.05
    rotational_acc_lim: 1.0

# ------------------------------------------------------------------
# local_costmap
# ------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      # Hexapod body (~12 cm) plus outstretched leg reach (~1–2 cm). 0.13 m
      # covers the physical footprint; anything smaller lets Nav2 clip legs
      # into walls because the robot-shaped region gets treated as free.
      robot_radius: 0.13
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /mcu/scan_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.1
          obstacle_max_range: 7.5
          obstacle_min_range: 0.1
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Softer cost gradient (was 15.0, razor-thin) — cost now decays over
        # the full inflation_radius so paths feel a continuous push from
        # walls instead of a step at the edge.
        cost_scaling_factor: 3.0
        # Inflation must be > robot_radius for the inflation layer to have
        # any effect beyond the footprint. 0.30 m leaves ~17 cm of "soft"
        # buffer beyond the 0.13 m robot body.
        inflation_radius: 0.30

# ------------------------------------------------------------------
# global_costmap
# ------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.13
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /mcu/scan_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.1
          obstacle_max_range: 7.5
          obstacle_min_range: 0.1
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # Global inflation slightly wider than local — the planner will
        # carve paths ~40 cm from walls while the local costmap (0.30 m)
        # allows tighter recovery / passage if needed.
        inflation_radius: 0.40

# ------------------------------------------------------------------
# velocity_smoother
# ------------------------------------------------------------------
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 10.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.15, 0.0, 0.20]
    min_velocity: [-0.15, 0.0, -0.20]
    max_accel: [0.5, 0.0, 1.0]
    max_decel: [-0.5, 0.0, -1.0]
    odom_topic: /odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]

# ------------------------------------------------------------------
# lifecycle_manager
# ------------------------------------------------------------------
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    # velocity_smoother is intentionally omitted — the launch file configures
    # and activates it explicitly because the lifecycle_manager autostart
    # races the smoother's service registration and leaves it INACTIVE,
    # which kills /cmd_vel. See real_object_seek.launch.py::vsmoother_activate.
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
    bond_timeout: 8.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0
