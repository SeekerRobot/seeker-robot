# ros_gz_bridge configuration for the Seeker hexapod simulation.
#
# Bridges Gazebo Harmonic topics ↔ ROS 2 topics.
# Sensor topics appear on /mcu/* to match real MCU topic names so the
# rest of the ROS 2 stack is hardware-agnostic.
---
# Simulation clock — required by all nodes with use_sim_time: true
- ros_topic_name: /clock
  gz_topic_name:  /clock
  ros_type_name:  rosgraph_msgs/msg/Clock
  gz_type_name:   gz.msgs.Clock
  direction:      GZ_TO_ROS

# Odometry — ground truth from Gazebo OdometryPublisher plugin
- ros_topic_name: /odom
  gz_topic_name:  /model/seeker/odometry
  ros_type_name:  nav_msgs/msg/Odometry
  gz_type_name:   gz.msgs.Odometry
  direction:      GZ_TO_ROS

# IMU → /mcu/imu (matches real MCU topic)
- ros_topic_name: /mcu/imu
  gz_topic_name:  /gz/imu
  ros_type_name:  sensor_msgs/msg/Imu
  gz_type_name:   gz.msgs.IMU
  direction:      GZ_TO_ROS

# LiDAR → /mcu/scan (matches real MCU topic)
- ros_topic_name: /mcu/scan
  gz_topic_name:  /gz/scan
  ros_type_name:  sensor_msgs/msg/LaserScan
  gz_type_name:   gz.msgs.LaserScan
  direction:      GZ_TO_ROS

# Camera image
- ros_topic_name: /camera/image
  gz_topic_name:  /gz/camera/image
  ros_type_name:  sensor_msgs/msg/Image
  gz_type_name:   gz.msgs.Image
  direction:      GZ_TO_ROS

# ── Joint position commands (ROS Float64 → Gazebo JointPositionController) ──
# ROS 2 topic names cannot contain tokens starting with a digit, so the ROS
# side uses /seeker/joint/<name>/cmd_pos while the Gazebo side retains the
# standard /model/seeker/joint/<name>/0/cmd_pos naming.

- ros_topic_name: /seeker/joint/leg_fl_hip/cmd_pos
  gz_topic_name:  /model/seeker/joint/leg_fl_hip_joint/0/cmd_pos
  ros_type_name:  std_msgs/msg/Float64
  gz_type_name:   gz.msgs.Double
  direction:      ROS_TO_GZ

